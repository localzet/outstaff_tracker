name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter compact

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
            $version = $line.Matches[0].Groups[1].Value.Split('+')[0]
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $source = "build\windows\x64\runner\Release"
          $archive = "release\outstaff_tracker-windows-portable-$env:VERSION.zip"
          Compress-Archive -Path "$source\*" -DestinationPath $archive -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $source = (Resolve-Path "build\windows\x64\runner\Release").Path
          $output = (Resolve-Path "release").Path
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer\windows\outstaff_tracker.iss" "/DAppVersion=$env:VERSION" "/DAppPublisher=Localzet Group" "/DSourceDir=$source" "/DOutputDir=$output"

      - name: Smoke test Windows installer
        shell: pwsh
        run: |
          $installer = (Resolve-Path "release\outstaff_tracker-setup-$env:VERSION.exe").Path
          $installDir = Join-Path $env:RUNNER_TEMP "Outstaff Tracker"
          & $installer /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /CURRENTUSER "/DIR=$installDir"
          $exe = Join-Path $installDir "outstaff_tracker.exe"
          if (!(Test-Path $exe)) {
            throw "Installed executable was not found: $exe"
          }
          $entry = Get-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" |
            Where-Object { $_.DisplayName -eq "Outstaff Tracker" } |
            Select-Object -First 1
          if ($null -eq $entry) {
            throw "Uninstall entry was not found"
          }
          $process = Start-Process -FilePath $exe -WindowStyle Hidden -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) {
            throw "Installed app exited during startup smoke test with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force
          $uninstaller = Join-Path $installDir "unins000.exe"
          & $uninstaller /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.version.outputs.version }}
          path: |
            release/outstaff_tracker-windows-portable-${{ steps.version.outputs.version }}.zip
            release/outstaff_tracker-setup-${{ steps.version.outputs.version }}.exe
          if-no-files-found: error

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Package Android artifacts
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/outstaff_tracker-android-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "release/outstaff_tracker-android-${VERSION}.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ steps.version.outputs.version }}
          path: |
            release/outstaff_tracker-android-${{ steps.version.outputs.version }}.apk
            release/outstaff_tracker-android-${{ steps.version.outputs.version }}.aab
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build Web release
        run: flutter build web --release

      - name: Package Web artifacts
        shell: bash
        run: |
          mkdir -p release
          (cd build/web && zip -r "../../release/outstaff_tracker-web-${VERSION}.zip" .)

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ steps.version.outputs.version }}
          path: release/outstaff_tracker-web-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android
      - build-web
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Outstaff Tracker ${{ github.ref_name }}
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
