name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter compact

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
            $version = $line.Matches[0].Groups[1].Value.Split('+')[0]
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $source = "build\windows\x64\runner\Release"
          $archive = "release\outstaff_tracker-windows-portable-$env:VERSION.zip"
          Compress-Archive -Path "$source\*" -DestinationPath $archive -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $source = (Resolve-Path "build\windows\x64\runner\Release").Path
          $output = (Resolve-Path "release").Path
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer\windows\outstaff_tracker.iss" "/DAppVersion=$env:VERSION" "/DAppPublisher=Localzet Group" "/DSourceDir=$source" "/DOutputDir=$output"

      - name: Sign Windows installer
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD)) {
            Write-Host "Windows signing secrets are not configured. Skipping Authenticode signing."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "outstaff_tracker_signing_certificate.pfx"
          [System.IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64))
          $installer = (Resolve-Path "release\outstaff_tracker-setup-$env:VERSION.exe").Path
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*\x64\signtool.exe" } |
            Sort-Object FullName -Descending |
            Select-Object -ExpandProperty FullName -First 1
          if (!$signtool) {
            throw "signtool.exe was not found"
          }
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certificatePath /p $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD $installer
          if ($LASTEXITCODE -ne 0) {
            throw "signtool signing failed with exit code $LASTEXITCODE"
          }
          $verify = Start-Process -FilePath $signtool -ArgumentList @("verify", "/pa", "/v", $installer) -Wait -PassThru -NoNewWindow
          if ($verify.ExitCode -ne 0) {
            Write-Warning "Trusted Authenticode verification failed. The installer is signed, but the certificate chain is not trusted by this runner. This is expected for self-signed test certificates and will not satisfy SmartScreen."
            Write-Warning "Continuing because signing itself succeeded; use a public OV/EV code signing certificate for trusted publisher identity."
          }
          Remove-Item $certificatePath -Force

      - name: Smoke test Windows installer
        shell: pwsh
        run: |
          $installer = (Resolve-Path "release\outstaff_tracker-setup-$env:VERSION.exe").Path
          $installDir = Join-Path $env:RUNNER_TEMP "Outstaff Tracker"
          $installLog = Join-Path $env:RUNNER_TEMP "outstaff-tracker-install.log"
          function Get-OutstaffUninstallEntry {
            $appId = "{6E2D62BE-315A-4C1E-B57D-19B9E9B21C0B}_is1"
            $directPaths = @(
              "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\$appId"
              "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\$appId"
              "HKCU:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\$appId"
              "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\$appId"
            )
            foreach ($path in $directPaths) {
              if (Test-Path $path) {
                return Get-ItemProperty $path
              }
            }
            $roots = @(
              "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall"
              "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall"
              "HKCU:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall"
              "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall"
            )
            foreach ($root in $roots) {
              if (Test-Path $root) {
                $match = Get-ChildItem $root -ErrorAction SilentlyContinue |
                  ForEach-Object { Get-ItemProperty $_.PsPath -ErrorAction SilentlyContinue } |
                  Where-Object {
                    $_.DisplayName -like "Outstaff Tracker*" -or
                    ($_.UninstallString -like "*Outstaff Tracker*" -and $_.UninstallString -like "*unins*.exe*")
                  } |
                  Select-Object -First 1
                if ($match) {
                  return $match
                }
              }
            }
            return $null
          }
          $installArgs = "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /CURRENTUSER /DIR=""$installDir"" /LOG=""$installLog"""
          $install = Start-Process -FilePath $installer -ArgumentList $installArgs -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            if (Test-Path $installLog) {
              Get-Content $installLog | Select-Object -Last 120
            }
            throw "Installer failed with exit code $($install.ExitCode)"
          }
          $entry = $null
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            $entry = Get-OutstaffUninstallEntry
            if ($entry) {
              break
            }
            Start-Sleep -Seconds 2
          }
          $exeCandidates = @(
            (Join-Path $installDir "outstaff_tracker.exe")
            $(if ($entry -and $entry.InstallLocation) { Join-Path $entry.InstallLocation "outstaff_tracker.exe" })
            (Join-Path $env:LOCALAPPDATA "Programs\Outstaff Tracker\outstaff_tracker.exe")
            (Join-Path $env:ProgramFiles "Outstaff Tracker\outstaff_tracker.exe")
          ) | Where-Object { $_ }
          $exe = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (!$exe) {
            $searchRoots = @(
              $installDir
              (Join-Path $env:LOCALAPPDATA "Programs")
              (Join-Path $env:ProgramFiles "Outstaff Tracker")
            )
            $exe = Get-ChildItem -Path $searchRoots -Filter outstaff_tracker.exe -Recurse -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName -First 1
          }
          if (!$exe -or !(Test-Path $exe)) {
            if (Test-Path $installLog) {
              Get-Content $installLog | Select-Object -Last 160
            }
            Get-ChildItem -Path $env:RUNNER_TEMP -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length
            throw "Installed executable was not found"
          }
          if (!$entry) {
            if (Test-Path $installLog) {
              Get-Content $installLog | Select-Object -Last 160
            }
            $debugRoots = @(
              "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall"
              "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall"
              "HKCU:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall"
              "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall"
            )
            foreach ($root in $debugRoots) {
              if (Test-Path $root) {
                Get-ChildItem $root -ErrorAction SilentlyContinue |
                  ForEach-Object { Get-ItemProperty $_.PsPath -ErrorAction SilentlyContinue } |
                  Where-Object { $_.DisplayName -or $_.UninstallString } |
                  Select-Object DisplayName, Publisher, InstallLocation, UninstallString |
                  Format-Table -AutoSize
              }
            }
            throw "Uninstall entry was not found"
          }
          $process = Start-Process -FilePath $exe -WindowStyle Hidden -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) {
            throw "Installed app exited during startup smoke test with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force
          $uninstaller = Join-Path (Split-Path $exe -Parent) "unins000.exe"
          if (!(Test-Path $uninstaller) -and $entry.UninstallString) {
            $uninstaller = ($entry.UninstallString -replace '^"', '') -replace '".*$', ''
          }
          if (!(Test-Path $uninstaller)) {
            throw "Uninstaller was not found"
          }
          $uninstall = Start-Process -FilePath $uninstaller -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            throw "Uninstaller failed with exit code $($uninstall.ExitCode)"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.version.outputs.version }}
          path: |
            release/outstaff_tracker-windows-portable-${{ steps.version.outputs.version }}.zip
            release/outstaff_tracker-setup-${{ steps.version.outputs.version }}.exe
          if-no-files-found: error

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Package Android artifacts
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/outstaff_tracker-android-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "release/outstaff_tracker-android-${VERSION}.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ steps.version.outputs.version }}
          path: |
            release/outstaff_tracker-android-${{ steps.version.outputs.version }}.apk
            release/outstaff_tracker-android-${{ steps.version.outputs.version }}.aab
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Build Web release
        run: flutter build web --release

      - name: Package Web artifacts
        shell: bash
        run: |
          mkdir -p release
          (cd build/web && zip -r "../../release/outstaff_tracker-web-${VERSION}.zip" .)

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ steps.version.outputs.version }}
          path: release/outstaff_tracker-web-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android
      - build-web
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and update metadata
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PUBSPEC_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          REPOSITORY="${GITHUB_REPOSITORY}"
          RELEASE_URL="https://github.com/${REPOSITORY}/releases/tag/${TAG}"
          DOWNLOAD_BASE_URL="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          WINDOWS_INSTALLER="outstaff_tracker-setup-${VERSION}.exe"

          if [[ ! -f "dist/${WINDOWS_INSTALLER}" ]]; then
            echo "Windows installer was not found: dist/${WINDOWS_INSTALLER}" >&2
            exit 1
          fi

          (cd dist && sha256sum * > SHA256SUMS.txt)
          WINDOWS_SHA256="$(sha256sum "dist/${WINDOWS_INSTALLER}" | awk '{print $1}')"
          WINDOWS_SIZE="$(stat -c%s "dist/${WINDOWS_INSTALLER}")"
          WINDOWS_URL="${DOWNLOAD_BASE_URL}/${WINDOWS_INSTALLER}"

          cat > dist/latest.json <<EOF
          {
            "tag": "${TAG}",
            "version": "${VERSION}",
            "pubspecVersion": "${PUBSPEC_VERSION}",
            "publishedAt": "${PUBLISHED_AT}",
            "prerelease": false,
            "releaseNotesUrl": "${RELEASE_URL}",
            "assets": {
              "windowsInstaller": {
                "name": "${WINDOWS_INSTALLER}",
                "url": "${WINDOWS_URL}",
                "sha256": "${WINDOWS_SHA256}",
                "size": ${WINDOWS_SIZE}
              }
            }
          }
          EOF

          PUB_DATE="$(date -u -R)"
          cat > dist/appcast.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Outstaff Tracker Updates</title>
              <description>Outstaff Tracker release feed</description>
              <language>ru</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:releaseNotesLink>${RELEASE_URL}</sparkle:releaseNotesLink>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure url="${WINDOWS_URL}"
                           sparkle:version="${VERSION}"
                           sparkle:shortVersionString="${VERSION}"
                           sparkle:os="windows"
                           sparkle:sha256="${WINDOWS_SHA256}"
                           length="${WINDOWS_SIZE}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Outstaff Tracker ${{ github.ref_name }}
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
