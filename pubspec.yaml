name: outstaff_tracker
description: Local-first cross-platform time analytics for freelancers using Kimai.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  fl_chart: ^0.69.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: 10.3.1
  go_router: ^14.6.2
  intl: ^0.20.1
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.26

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  drift_dev: ^2.31.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  flutter_secure_storage_windows:
    path: vendor/flutter_secure_storage_windows
